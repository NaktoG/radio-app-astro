<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1b26" />
    <title>Sin conexión | Radio App</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1b26;
        color: #c0caf5;
      }
      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: linear-gradient(160deg, #16161e 0%, #1a1b26 42%, #24283b 100%);
      }
      main {
        width: min(100%, 28rem);
        padding: 1.5rem;
        border: 1px solid color-mix(in oklab, #c0caf5 18%, transparent);
        border-radius: 1.25rem;
        background: color-mix(in oklab, #24283b 80%, transparent);
        text-align: center;
        box-shadow: 0 24px 80px rgb(0 0 0 / 0.45);
      }
      img {
        width: 4rem;
        height: 4rem;
      }
      h1 {
        margin: 1rem 0 0.5rem;
        font-size: clamp(1.75rem, 8vw, 2.5rem);
        line-height: 1.05;
      }
      p {
        margin: 0 0 1.25rem;
        color: #a9b1d6;
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        background: linear-gradient(90deg, #7aa2f7, #7dcfff);
        color: white;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon.svg" alt="" />
      <h1>Sin conexión</h1>
      <p>Radio App está instalada, pero necesitás conexión para cargar estaciones y reproducir streams en vivo.</p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
